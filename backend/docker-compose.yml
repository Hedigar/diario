services:
  db:
    image: mysql:8.0
    container_name: seduc_db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: seduc_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3308:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: seduc_api
    ports:
      - "8088:80"
    volumes:
      - ./api:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=seduc_db
      - DB_USER=user
      - DB_PASS=password
